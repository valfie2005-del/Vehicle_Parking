<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>

    {% block title %}
    <title>Layout Page</title>
    {% endblock %}

    <meta name='viewport' content='width=device-width, initial-scale=1'>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">

    <style>

        body{
            background:#f5f5f5;
            font-family:'Segoe UI',sans-serif;
        }

        /* Navbar */

        .navbar{
            background:#000 !important;
            padding:15px 40px;
            box-shadow:0 5px 15px rgba(0,0,0,.3);
        }

        .navbar-brand{
            color: #f5e5e3 !important;
            font-size:28px;
            font-weight:bold;
        }

        .navbar-brand:hover{
            color:white !important;
        }

        .navbar-nav .nav-link{
            color:white !important;
            margin-left:20px;
            transition:.3s;
            font-weight:500;
        }

        .navbar-nav .nav-link:hover{
            color:#782313 !important;
        }

        /* Container */

        .container{
            margin-top:40px;
            margin-bottom:40px;
        }

        /* Card */

        .jumbotron{
            background:white;
            border:none;
            border-radius:18px;
            padding:40px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        h1,h2,h3{
            color:#782313;
            font-weight:bold;
        }

        /* Inputs */

        .form-control{
            border-radius:10px;
            border:1px solid #ddd;
        }

        .form-control:focus{
            border-color:#782313;
            box-shadow:0 0 8px rgba(120,35,19,.3);
        }

        /* Buttons */

        .btn{
            border-radius:8px;
            padding:8px 20px;
            font-weight:600;
        }

        .btn-success{
            background:#782313;
            border:#782313;
        }

        .btn-success:hover{
            background:#5b180d;
        }

        .btn-warning{
            background:#782313;
            border:#782313;
            color:white;
        }

        .btn-warning:hover{
            background:#5b180d;
            color:white;
        }

        .btn-danger{
            background:black;
            border:black;
        }

        .btn-danger:hover{
            background:#782313;
            border:#782313;
        }

        /* Table */

        .table-container{
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 10px 20px rgba(0,0,0,.15);
        }

        .table thead{
            background:#782313;
            color:white;
        }

        .table tbody tr:hover{
            background:#f7ece9;
        }

        a{
            text-decoration:none !important;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <a class="navbar-brand" href="#">VEHICLE PARKING APP</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

        <ul class="navbar-nav ml-auto">

            <li class="nav-item">
                <a class="nav-link" href="{% url 'parking_url' %}">
                    Add Vehicle
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'show_url' %}">
                    Show Vehicles
                </a>
            </li>

        </ul>

    </div>

</nav>

{% block content %}
{% endblock %}

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

</body>
</html>
