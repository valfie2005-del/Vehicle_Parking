{% extends 'layout.html' %}

{% block title %}
<title>Confirmation Page</title>
{% endblock %}

{% block content %}

<div class="container">

    <form class="jumbotron text-center" method="post">

        {% csrf_token %}

        <h2 class="mb-4">
            Are you sure you want to delete this data?
        </h2>

        <input type="submit" value="YES" class="btn btn-danger">

        <a href="{% url 'show_url' %}" class="btn btn-success">
            NO
        </a>

    </form>

</div>

{% endblock %}
